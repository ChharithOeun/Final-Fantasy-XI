# Tier 0 ambient wildlife — pure reactive, no LLM, no schedule.
#
# Each entry maps to a UE5 BehaviorTree asset (`/Game/AI/BT/<bt>`)
# and a flee_radius_cm. The orchestrator's loader is extended (or a
# small stamper script) to expand this file into one row per
# placeholder in the agents table.

agents:

  # rats in the alley — dart away from footsteps
  - id: rat_alley_1
    name: rat
    zone: bastok_markets
    position: [-3500, -3000, 20]
    tier: 0_reactive
    role: rat
    race: wildlife
    gender: n
    behavior_tree: /Game/AI/BT/Wildlife_Rat
    flee_radius_cm: 250

