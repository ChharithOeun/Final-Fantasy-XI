# Naga Renja — sprint-NIN serpent-folk. Uses hand signs per
# NIN_HAND_SIGNS.md. The "you can't kite this" mob.

mob_class: naga_renja
race: beastman_naga
gender: n
voice_profile_stock: /Content/Voices/StockMobs/naga_renja.wav

aligned_element: water
weak_to: lightning
strong_against: fire

policy_onnx: /Content/AI/Policies/naga_renja_v1.onnx
state_features:
  - self_hp_normalized
  - self_tp_normalized
  - target_hp_normalized
  - distance_to_target_cm
  - target_velocity_magnitude       # is the player kiting?
  - target_velocity_direction       # which way?
  - target_is_casting
  - has_been_paralyzed_recently
  - daytime
action_space:
  - 0: melee_strike
  - 1: hyoton_ichi          # ice ninjutsu, sprint-cast
                             # seal sequence: Bird→Snake→Ram→Boar→Ox→Tiger
  - 2: doton_ichi           # earth bind, root the player
  - 3: katon_ichi           # fire AoE on self, cone forward
  - 4: aisha                # debuff stack, hand-sign sequence
  - 5: utsusemi_ichi        # shadow images (3 evasion stacks)
                             # canonical NIN survival tool
  - 6: sprint_pursuit       # full-speed sprint at target
  - 7: tonko_ni             # escape if HP below 25%

visible_health_archetype: wildlife_small      # serpentine; smaller archetype
level_range: [25, 40]

mood_axes: [alert, content, fierce]
starting_mood: alert

bark_pool:
  alert:
    - "[hissing speech]"
    - "[chakra-flow whoosh]"
  content:
    - "[low hiss, watching]"
  fierce:
    - "[high-pitched hiss, war cry]"

damage_response:
  on_player_attacked_me: |
    Naga IMMEDIATELY signs Utsusemi: Ichi (3 shadow images) before
    engaging. Then sprints at the player while signing the next
    spell. Player must read the seal sequence to predict the spell.
  on_aoe_near: |
    Naga doesn't dodge AOE — they sign Utsusemi to absorb hits.
    Mood -> alert.
  on_player_kiting_me: |
    Naga's RL policy detects kiting (target_velocity_magnitude high)
    and pops Sprint Pursuit. The player's mount-speed advantage
    is negated; the Naga can match speed while signing Doton Ichi
    to root them on landing.
  on_outlaw_nearby: |
    Naga don't care about outlaw status. They engage all humanoid
    intruders.

# Naga is the canonical "you can't kite this" lesson for new players.
# A WHM trying to kite a Naga is going to discover that:
#   1. Their Stoneskin gets shredded by Hyoton: Ichi (ice damage in
#      a 6-seal sprint-cast)
#   2. Their feet get rooted by Doton: Ichi (earth bind via signs)
#   3. The Naga catches up because Sprint Pursuit ignores weight
#      (Naga is hand-signing not vocal-casting)
#
# The lesson: read the seal sequence, time your interrupts, don't kite
# what doesn't kite-back.
